name: Collect Makan Mood IG Stats

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv pandas gspread google-auth

      - name: Create credentials files
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          mkdir -p secrets
          echo "$GOOGLE_CREDENTIALS_JSON" > secrets/google-service-account.json
          echo "META_ACCESS_TOKEN=$META_ACCESS_TOKEN" > .env
          echo "IG_BUSINESS_ACCOUNT_ID=17841480547594788" >> .env
          echo "PAGE_ID=1113066855225187" >> .env
          echo "GOOGLE_SHEET_ID=1rscVUw8ZNP1bpsUUQdn1XdM-QSp2Ku1zTNFV_t3p0yM" >> .env
          echo "GOOGLE_CREDENTIALS_PATH=secrets/google-service-account.json" >> .env

      - name: Run stats collector
        run: python ig_stats.py

      - name: Cleanup credentials
        if: always()
        run: |
          rm -f secrets/google-service-account.json
          rm -f .env

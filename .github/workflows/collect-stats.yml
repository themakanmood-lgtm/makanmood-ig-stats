name: Collect Stats

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv pandas gspread google-auth

      - name: Create credentials files
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          echo "META_ACCESS_TOKEN=${META_ACCESS_TOKEN}" >> .env
          echo "IG_BUSINESS_ACCOUNT_ID=17841480547594788" >> .env
          echo "GOOGLE_SHEET_ID=1rscVUw8ZNP1bpsUUQdn1XdM-QSp2Ku1zTNFV_t3p0yM" >> .env
          echo "GOOGLE_CREDENTIALS_PATH=secrets/google-service-account.json" >> .env
          mkdir -p secrets
          printf '%s' "${GOOGLE_CREDENTIALS}" > secrets/google-service-account.json
          cp secrets/google-service-account.json service-account.json

      - name: Run Instagram stats collector
        run: python ig_stats.py

      - name: Run Facebook stats collector
        run: python fb_stats.py

      - name: Export data.json for dashboard
        run: python export_json.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/fb_data.json
          git diff --staged --quiet || git commit -m "chore: update data.json + fb_data.json [skip ci]"
          git push
          
